<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library System</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="header">
        <div class="main-text">
            <img src="books-stack-of-three-svgrepo-com.svg" alt="">
            <p>Abhi Library</p>
        </div>


        <div class="button">
            <button class="add-book-button">+</button>
        </div>


        <div class="navbar">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Info</a></li>
            </ul>
        </div>

    </div>



    <div class="main-content">
    </div>
       




    <dialog id="my-dialog">
        <h3>Add a new book</h3>
        <form action="#" method="post">
            <div>
                <label for="book_name">Book Name:</label>
                <input type="text" name="book_name" id="book_name">
            </div>

            <div>
                <label for="author_name">Author Name:</label>
                <input type="text" name="author_name" id="author_name">
            </div>

            <div>
                <label for="pages">No. Of pages</label>
                <input type="number" name="pages" id="pages">
            </div>
            <div>
                <input type="checkbox" id="read" name="read_status" value="completed">
                <label for="read">Read</label>
            </div>

            <button type="submit" class="addbtn">Add Book</button>

        </form>
        <button class="dialog-close-btn">Cancel</button>
    </dialog>






</body>

</html>
